<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Ninja 🥷</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Bangers', cursive;
      user-select: none;
    }
    
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #camera-preview {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 160px;
      height: 120px;
      border: 3px solid #00f3ff;
      border-radius: 12px;
      transform: scaleX(-1);
      opacity: 0.4;
      z-index: 100;
      object-fit: cover;
      display: none;
    }
    
    #camera-preview.visible { display: block; }
    
    /* Hand Tracking Status */
    #tracking-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      z-index: 100;
      display: none;
      align-items: center;
      gap: 10px;
    }
    
    #tracking-status.detected {
      background: rgba(0, 255, 100, 0.2);
      border: 2px solid #00ff64;
      color: #00ff64;
    }
    
    #tracking-status.not-detected {
      background: rgba(255, 100, 100, 0.2);
      border: 2px solid #ff6464;
      color: #ff6464;
    }
    
    #tracking-status .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    
    #tracking-status.detected .dot { background: #00ff64; }
    #tracking-status.not-detected .dot { background: #ff6464; }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* HUD */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 50;
    }
    
    .hud-item {
      color: #fff;
      text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
      font-size: 2rem;
      letter-spacing: 2px;
    }
    
    #score { 
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
    }
    
    #lives { font-size: 2rem; }
    
    #combo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      color: #ff00ff;
      text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
      opacity: 0;
      pointer-events: none;
      z-index: 60;
      transition: opacity 0.2s;
    }
    
    #combo.visible { opacity: 1; }
    
    /* Screens */
    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      background: rgba(10, 10, 15, 0.95);
    }
    
    .screen.hidden { display: none; }
    
    #start-screen h1 {
      font-size: 6rem;
      color: #fff;
      text-shadow: 0 0 20px #00f3ff, 0 0 40px #ff00ff, 0 0 60px #00f3ff;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    #start-screen p {
      font-family: 'Orbitron', sans-serif;
      color: #aaa;
      font-size: 1.2rem;
      margin-bottom: 40px;
    }
    
    .btn {
      background: linear-gradient(135deg, #00f3ff, #ff00ff);
      border: none;
      padding: 20px 60px;
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #00f3ff, 0 0 60px #ff00ff;
    }
    
    /* Game Over */
    #game-over h2 {
      font-size: 4rem;
      color: #ff3366;
      text-shadow: 0 0 20px #ff3366;
      margin-bottom: 20px;
    }
    
    #final-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: #00f3ff;
      margin-bottom: 40px;
    }
    
    #high-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #ff00ff;
      margin-bottom: 40px;
    }
    
    /* Loading */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    #loading.hidden { display: none; }
    
    .loader {
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top-color: #00f3ff;
      border-bottom-color: #ff00ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div></div>
  
  <div id="game-container"></div>
  <video id="camera-preview" autoplay playsinline></video>
  
  <div id="tracking-status">
    <span class="dot"></span>
    <span id="tracking-text">Initializing...</span>
  </div>
  
  <div id="hud">
    <div class="hud-item">SCORE: <span id="score">0</span></div>
    <div class="hud-item" id="lives">❤️❤️❤️</div>
  </div>
  
  <div id="combo"></div>
  
  <div id="start-screen" class="screen">
    <h1>🥷 GESTURE NINJA</h1>
    <p>Slice fruits with your hand! Avoid the bombs!</p>
    <button class="btn" id="btn-start">START GAME</button>
  </div>
  
  <div id="game-over" class="screen hidden">
    <h2>GAME OVER</h2>
    <div id="final-score">0</div>
    <div id="high-score">HIGH SCORE: 0</div>
    <button class="btn" id="btn-restart">PLAY AGAIN</button>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
